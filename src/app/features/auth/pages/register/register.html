<div class="register-container">
  <div class="register-box">
    <div class="auth-logo">
      <h1 class="kamux-logo-text">Kamux</h1>
    </div>

    <h2>Crear Cuenta</h2>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          placeholder="Elige un nombre de usuario"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="Crea una contraseña"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          placeholder="Repite tu contraseña"
          autocomplete="new-password"
        />
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>

      <button
        type="submit"
        [disabled]="isLoading || !username.trim() || !password.trim() || !confirmPassword.trim()"
      >
        {{ isLoading ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <div class="auth-redirect">
      <p>¿Ya tienes una cuenta? <a routerLink="/auth/login">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
